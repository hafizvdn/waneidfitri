<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kad Imbasan Selamat Hari Raya | Wan Advertising</title>
    <style>
        /* Import fon yang elegan dan menarik */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,700&family=Poppins:wght@300;400;600&display=swap');

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f1ea;
            font-family: 'Poppins', sans-serif;
        }

        /* Container untuk menetapkan perspektif 3D */
        .card-container {
            perspective: 1000px;
            cursor: pointer;
        }

        /* Tetapan kad utama */
        .card {
            width: 350px;
            height: 450px;
            position: relative;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border-radius: 20px;
        }

        /* Kelas yang akan diaktifkan melalui JavaScript */
        .card.is-flipped {
            transform: rotateY(180deg);
        }

        /* Gaya umum untuk bahagian Depan dan Belakang */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            box-sizing: border-box;
            border: 4px solid #d4af37; /* Border emas */
        }

        /* Bahagian Depan kad */
        .card-front {
            background: linear-gradient(135deg, #0f4c3a 0%, #062e22 100%);
            color: #d4af37; /* Teks emas */
        }

        .card-front h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin: 0;
            line-height: 1.2;
        }

        .card-front p {
            font-size: 1rem;
            color: #e0d0a6;
            margin-top: 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5));
        }

        /* Bahagian Belakang kad */
        .card-back {
            background: linear-gradient(135deg, #155d47 0%, #0b3d2e 100%);
            color: #fff;
            transform: rotateY(180deg);
        }

        .card-back h2 {
            font-family: 'Playfair Display', serif;
            color: #d4af37;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .card-back p.message {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #e8e8e8;
        }

        .card-back .company-name {
            margin-top: auto;
            font-weight: 600;
            color: #d4af37;
            font-size: 1.2rem;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            padding-top: 15px;
            width: 100%;
        }

        .hint {
            position: absolute;
            bottom: 15px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="card-container" onclick="flipCard()">
        <div class="card" id="rayaCard">
            <div class="card-face card-front">
                <div class="icon">🌙✨</div>
                <h1>Selamat<br>Hari Raya</h1>
                <p>Aidilfitri</p>
                <div class="hint">Klik untuk pusing</div>
            </div>

            <div class="card-face card-back">
                <h2>Maaf Zahir & Batin</h2>
                <p class="message">
                    Selamat menyambut Hari Raya yang penuh keceriaan dan keberkatan. Semoga musim perayaan ini membawa kedamaian, kemakmuran, dan kebahagiaan kepada anda dan keluarga.
                </p>
                <div class="company-name">
                    Salam mesra,<br>
                    Wan Advertising
                </div>
            </div>
        </div>
    </div>

    <script>
        // JavaScript untuk mengawal animasi pusingan (flip)
        function flipCard() {
            const card = document.getElementById('rayaCard');
            card.classList.toggle('is-flipped');
        }
    </script>

</body>
</html>
